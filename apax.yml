name: "@simatic-ax/lsinatopo"
version: 0.0.0-placeholder
type: lib
author: Siemens AG

# Description will be displayed in the apax extension
description: Modify the topology of Sinamics S120 drives from the user program
keywords:
  - library

# Targets to be compiled with 'apax build'
targets:
  - 's7'
  - 'llvm'

#URL to the repository
repository:
  type: git
  url: https://github.com/simatic-ax/lsinatopo

# Registry information, to other npm-registries where Apax packages are located
# '@scope': 'registry-url'
registries:
  '@simatic-ax': 'https://npm.pkg.github.com/'

# The public key(s) to verify dependencies. This ensures, that the package is
# not tampered with.
publicKeys:
  "@simatic-ax":
    "v1": "3792a7e926775425ccdd29ceed8c368c3008b5b33d7d5550b3cb1f58093e1dff"
    "v2": "7af3e394eb2b285a3d99ab8e1f745cc6db75704b30a80393339c721a92ffffd9"

variables:
  APAX_BUILD_ARGS:
    - "--debug" # Generate debug information for target "s7"
files:
  - 'README.md'
  - 'LICENSE.md'
  - 'docs'
  - 'bin'

catalogs:
    "@ax/simatic-ax": ^2510.12.0
dependencies:
  "@ax/system-serde": ^10.4.16
  "@simatic-ax/lacyccom": ^4.0.1

devDependencies:
  "@ax/sdk": ^2510.14.0
